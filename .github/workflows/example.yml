name: Example - publish artifacts

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # E2E tests etc. generate artifact files (screenshots, videos, etc.) here.
      # Generate a dummy artifact file for verification purposes.
      - name: Generate dummy artifacts
        run: |
          mkdir -p artifacts
          echo "hello from run ${{ github.run_id }}" > artifacts/demo.txt

      - id: publish
        uses: ./
        with:
          files: artifacts/**/*.txt

      - name: Add link to step summary
        run: |
          echo "${{ steps.publish.outputs.urls }}" | while IFS= read -r url; do
            echo "[demo.txt]($url)" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "branch: ${{ steps.publish.outputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "commit-sha: ${{ steps.publish.outputs.commit-sha }}" >> "$GITHUB_STEP_SUMMARY"

  comment-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      # E2E tests etc. generate artifact files here.
      # Download a random image plus a text file, for verification purposes.
      # (The image is embedded inline; the .txt is listed as a link — see the README's
      #  "File types and browser behavior" section for why HTML is intentionally avoided here.)
      - name: Generate dummy artifacts
        run: |
          mkdir -p artifacts
          curl -fsSL "https://picsum.photos/seed/${{ github.run_id }}/800/600" -o artifacts/demo.png
          echo "hello from run ${{ github.run_id }}" > artifacts/demo.txt

      - uses: ./comment-files
        with:
          files: artifacts/**/*
          message: "Artifacts from this run:"
